# Build VaultChat desktop installers for macOS + Windows.
# Trigger: push tag v* or manual workflow_dispatch.
#
# macOS Gatekeeper: unsigned DMGs show "is damaged and can't be opened" after
# download. To ship a working .dmg, add Apple Developer ID + notarization secrets
# (see apps/desktop/README.md). Without them, CI still builds unsigned artifacts.
name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--bundles app,dmg"
          - platform: windows-latest
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @vaultchat/protocol --filter @vaultchat/crypto --filter @vaultchat/client --filter @vaultchat/chat-react build

      - name: Production desktop env
        working-directory: apps/desktop
        shell: bash
        run: |
          printf '%s\n' \
            'VITE_API_BASE_URL=https://chat.addjoybarreto.com' \
            'VITE_WS_URL=wss://vaultchat-gateway.fly.dev' \
            > .env.production

      # Tauri signs + notarizes when APPLE_* secrets are set (macOS only).
      # See https://v2.tauri.app/distribute/sign/macos/
      - name: Build Tauri app
        working-directory: apps/desktop
        env:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          VITE_API_BASE_URL: https://chat.addjoybarreto.com
          VITE_WS_URL: wss://vaultchat-gateway.fly.dev
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm exec tauri build ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vaultchat-desktop-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
