# fly.toml app configuration file generated for vaultchat-gateway on 2026-07-12T12:12:22+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vaultchat-gateway'
primary_region = 'iad'

[build]
  dockerfile = '../../services/gateway/Dockerfile'

[env]
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '45s'
    interval = '15s'
    timeout = '5s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
