# fly launch --config infra/fly/gateway.toml
app = "vaultchat-gateway"
primary_region = "iad"

[build]
  dockerfile = "../../services/gateway/Dockerfile"

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    method = "GET"
    path = "/"
